<!DOCTYPE html>
<html>
<head>
<title>SIPHLA LK</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="background:#F5F5F5;color:#333;font-family:Arial;margin:0;padding:0">

<div id="app"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
var firebaseConfig = {
  apiKey: "AIzaSyA_3J2P4S6A0BCQrnqMEruS10QNwFBX8w",
  databaseURL: "https://siphala-lk-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "siphala-lk"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();
var lessonsRef = db.ref('lessons');
var allLessons = [];

function getYouTubeID(url){
  if(!url) return '';
  var regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/;
  var match = url.match(regExp);
  return (match&&match[7].length==11)? match[7] : '';
}

lessonsRef.on('value', function(snapshot) {
  allLessons = [];
  snapshot.forEach(function(child) {
    var l = child.val();
    l.key = child.key;
    allLessons.push(l);
  });
  showGrades();
});

// HEADER FUNCTION
function header(title, backFunc){
  return '<div style="background:linear-gradient(135deg,#8B5CF6,#A855F7);padding:20px;display:flex;align-items:center;box-shadow:0 4px 10px rgba(0,0,0,0.2)"><div onclick="'+backFunc+'" style="width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,0.1);display:flex;align-items:center;justify-content:center;cursor:pointer;margin-right:15px"><span style="font-size:24px;color:white">‹</span></div><h1 style="color:white;margin:0;font-size:22px;flex:1;text-align:center">'+title+'</h1><div style="width:40px"></div></div>';
}

// STEP 1: Grades
function showGrades(){
  var grades = [...new Set(allLessons.map(l => l.grade))].sort((a,b)=>{
    if(a=='A/L') return 1; if(b=='A/L') return -1; return a-b;
  });

  var html = header('Select Grade', '');
  html += '<div style="padding:20px;display:grid;grid-template-columns:repeat(3,1fr);gap:15px">';
  grades.forEach(g => {
    var displayName = g == 'A/L'? 'A Level' : 'Grade ' + g;
    html += '<div onclick="showSubjects(\'' + g + '\')" style="background:white;border-radius:12px;padding:20px 10px;text-align:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.1)">';
    html += '<div style="background:linear-gradient(135deg,#8B5CF6,#A855F7);width:70px;height:70px;border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:bold;color:white">' + g + '</div>';
    html += '<div style="font-weight:600;font-size:14px">' + displayName + '</div>';
    html += '</div>';
  });
  html += '</div>';
  app.innerHTML = html;
}

// STEP 2: Subjects - Pink Purple Card
function showSubjects(grade){
  var subjects = [...new Set(allLessons.filter(l => l.grade == grade).map(l => l.subject))].sort();
  var html = header('Grade ' + grade, 'showGrades()');
  html += '<div style="padding:20px">';
  subjects.forEach(s => {
    // Sinhala name eka check karanna. Admin eke "Sinhala,English" wage damma nam split wenawa
    var sinName = s;
    var enName = '';
    if(s.includes(',')){
      var parts = s.split(',');
      sinName = parts[0];
      enName = parts[1];
    }
    html += '<div onclick="showLessons(\'' + grade + '\',\'' + s + '\')" style="background:white;border-radius:15px;padding:15px;margin-bottom:15px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.1)">';
    html += '<div style="background:linear-gradient(135deg,#EC4899,#A855F7);padding:20px;border-radius:12px;text-align:center;color:white">';
    html += '<div style="font-size:22px;font-weight:bold;margin-bottom:5px">'+sinName+'</div>';
    if(enName) html += '<div style="font-size:16px">'+enName+'</div>';
    html += '</div></div>';
  });
  html += '</div>';
  app.innerHTML = html;
}

// STEP 3: Lessons - Thumbnail Cards
function showLessons(grade, subject){
  var lessons = allLessons.filter(l => l.grade == grade && l.subject == subject);
  var html = header(subject.split(',')[0], 'showSubjects(\'' + grade + '\')');
  html += '<div style="padding:20px">';
  lessons.forEach((l,index) => {
    var videoID = getYouTubeID(l.ytlink);
    var thumbnail = videoID? 'https://img.youtube.com/vi/' + videoID + '/hqdefault.jpg' : 'https://via.placeholder.com/400x225/8B5CF6/FFFFFF?text=SIPHLA.LK';

    html += '<div onclick="playLesson(\'' + l.key + '\')" style="background:white;border-radius:15px;padding:10px;margin-bottom:15px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.1)">';
    html += '<img src="'+thumbnail+'" style="width:100%;border-radius:10px;margin-bottom:10px">';
    html += '<div style="font-size:16px;font-weight:600;text-align:center">'+ (index+1) +'. පාඩම | ' + l.title + '</div>';
    html += '</div>';
  });
  html += '</div>';
  app.innerHTML = html;
}

// STEP 4: Video
function playLesson(key){
  var l = allLessons.find(x => x.key == key);
  var videoID = getYouTubeID(l.ytlink);
  var embedLink = videoID? 'https://www.youtube-nocookie.com/embed/' + videoID : '';

  var html = header(l.title, 'showLessons(\'' + l.grade + '\',\'' + l.subject + '\')');
  html += '<div style="padding:20px">';
  if(videoID){
    html += '<div id="vid-' + key + '" style="position:relative;cursor:pointer;border-radius:12px;overflow:hidden" onclick="startVideo(\'' + key + '\',\'' + embedLink + '\')">';
    html += '<img src="https://img.youtube.com/vi/' + videoID + '/hqdefault.jpg" style="width:100%;display:block">';
    html += '<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:60px">▶️</div>';
    html += '</div>';
  }
  html += '</div>';
  app.innerHTML = html;
}

function startVideo(key, embedLink){
  document.getElementById('vid-' + key).innerHTML =
  '<iframe width="100%" height="230" src="' + embedLink + '?autoplay=1&rel=0&modestbranding=1" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen style="border-radius:12px"></iframe>';
}
</script>
</body>
</html>
