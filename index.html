<!DOCTYPE html>
<html>
<head>
<title>SIPHLA LK - Lessons</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;font-family:Arial;padding:20px">

<h1 style="text-align:center">📚 SIPHLA LK</h1>
<p style="text-align:center">Free Lessons for Grade 6 - A/L</p>

<div id="lessons" style="max-width:900px;margin:30px auto"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
var firebaseConfig = {
  apiKey: "AIzaSyA_3J2P4S6A0BCQrnqMEruS10QNwFBX8w",
  databaseURL: "https://siphala-lk-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "siphala-lk"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();
var lessonsRef = db.ref('lessons');

function getYouTubeID(url){
  if(!url) return '';
  var regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/;
  var match = url.match(regExp);
  return (match&&match[7].length==11)? match[7] : '';
}

lessonsRef.on('value', function(snapshot) {
  var html = '';
  if(snapshot.numChildren() == 0){ html = '<p style="text-align:center">No lessons yet</p>' }

  snapshot.forEach(function(child) {
    var l = child.val();
    var videoID = getYouTubeID(l.ytlink);
    var thumbnail = videoID? 'https://img.youtube.com/vi/' + videoID + '/hqdefault.jpg' : '';
    // WENAS 1: youtube-nocookie.com use kale
    var embedLink = videoID? 'https://www.youtube-nocookie.com/embed/' + videoID : '';

    html += '<div style="background:rgba(255,255,255,0.15);padding:20px;border-radius:15px;margin-bottom:20px">';
    html += '<span style="background:#8B5CF6;padding:5px 12px;border-radius:20px;font-size:12px">Grade ' + l.grade + ' - ' + l.subject + '</span>';
    html += '<h3 style="margin:15px 0">' + l.title + '</h3>';

    if(videoID){
      html += '<div id="vid-' + child.key + '" style="position:relative;cursor:pointer;border-radius:12px;overflow:hidden" onclick="playVideo(\'' + child.key + '\',\'' + embedLink + '\')">';
      html += '<img src="' + thumbnail + '" style="width:100%;display:block">';
      html += '<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:60px">▶️</div>';
      html += '</div>';
    } else {
      html += '<p style="opacity:0.7">No video link</p>';
    }
    html += '</div>';
  });
  lessons.innerHTML = html;
});

function playVideo(id, embedLink){
  // WENAS 2: privacy mode params add kale
  document.getElementById('vid-' + id).innerHTML =
  '<iframe width="100%" height="250" src="' + embedLink + '?autoplay=1&rel=0&modestbranding=1" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen style="border-radius:12px"></iframe>';
}
</script>
</body>
</html>
