<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIPHLA LK Dashboard</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
  body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height:100vh; color:#fff; padding:15px; }

 .glass { background: rgba(255,255,255,0.12); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.2); border-radius: 16px; }

 .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; padding:0 5px; }
 .header h1 { display:flex; align-items:center; gap:10px; font-size:26px; }
 .logout { padding:10px 18px; background:#EF4444; color:white; border:none; border-radius:10px; font-weight:600; cursor:pointer; }

 .tabs { display:flex; gap:10px; margin-bottom:20px; }
 .tab { padding:12px 20px; border-radius:12px; cursor:pointer; background: rgba(255,255,255,0.15); font-weight:500; }
 .tab.active { background: linear-gradient(90deg, #6366F1, #8B5CF6); }

 .section { padding: 20px; margin-bottom: 20px; }
 .section h2 { margin-bottom:15px; display:flex; align-items:center; gap:8px; font-size:18px; }

 .input { width:100%; padding:14px; margin:10px 0; border:none; border-radius:10px; background: rgba(255,255,255,0.15); color:#fff; font-size:15px; }
 .input::placeholder{color:rgba(255,255,255,0.7)}

 .btn { padding:12px 20px; background: linear-gradient(90deg, #6366F1, #8B5CF6); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:600; }
 .btn-sm { padding:8px 12px; font-size:13px; margin:2px; border-radius:8px; }
 .btn-edit { background:#F59E0B; }
 .btn-delete { background:#EF4444; }

  /* TABLE FIX - IMPORTANT */
 .table-wrapper { overflow-x: auto; width:100%; }
  table { width:100%; min-width: 500px; border-collapse: collapse; }
  th, td { padding:14px 10px; text-align:left; white-space: nowrap; }
  th { opacity:0.9; font-weight:600; }
  tr:hover { background: rgba(255,255,255,0.08); }

 .toast { position:fixed; top:20px; right:20px; background:#4ADE80; color:#000; padding:14px 20px; border-radius:10px; font-weight:600; display:none; z-index:999; }
</style>
</head>
<body>

<div class="toast" id="toast">✅ Saved!</div>

<div class="header">
  <h1>📊 Dashboard</h1>
  <button onclick="logout()" class="logout">Logout</button>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('dashboard', this)">Dashboard</div>
  <div class="tab" onclick="showTab('lessons', this)">Lessons</div>
</div>

<!-- DASHBOARD TAB -->
<div id="dashboard" class="tabContent">
  <div class="section glass">
    <h2>📈 Quick Stats</h2>
    <p>Total Lessons: <b id="totalLessons">0</b></p>
  </div>
</div>

<!-- LESSONS TAB -->
<div id="lessons" class="tabContent" style="display:none;">
  <div class="section glass">
    <h2>➕ Add New Lesson</h2>
    <input type="text" id="grade" class="input" placeholder="Grade e.g: 10, 11, A/L">
    <input type="text" id="subject" class="input" placeholder="Subject">
    <input type="text" id="title" class="input" placeholder="Lesson Title">
    <button onclick="addLesson()" class="btn">Save Lesson</button>
  </div>

  <div class="section glass">
    <h2>📝 All Lessons</h2>
    <div class="table-wrapper"> <!-- 👈 Meka nisa scroll wenawa -->
      <table>
        <thead>
          <tr>
            <th>Grade</th>
            <th>Subject</th>
            <th>Title</th>
            <th>Action</th> <!-- 👈 meka dan penawa -->
          </tr>
        </thead>
        <tbody id="lessonBody"></tbody>
      </table>
    </div>
    <p style="font-size:12px; opacity:0.7; margin-top:10px;">Tip: Table eka dakata swipe karanna 👉</p>
  </div>
</div>

<script>
  let lessons = JSON.parse(localStorage.getItem('siphala_lessons')) || [];

  window.onload = loadLessons;

  function showTab(tab, el) {
    document.querySelectorAll('.tabContent').forEach(e=>e.style.display='none');
    document.getElementById(tab).style.display='block';
    document.querySelectorAll('.tab').forEach(e=>e.classList.remove('active'));
    el.classList.add('active');
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.innerText = msg;
    toast.style.display = 'block';
    setTimeout(()=>toast.style.display='none', 2000);
  }

  function addLesson() {
    const lesson = {
      grade:grade.value, subject:subject.value, title:title.value
    };
    if(!lesson.grade ||!lesson.subject ||!lesson.title) { alert('Please fill all fields'); return; }
    lessons.push(lesson);
    localStorage.setItem('siphala_lessons', JSON.stringify(lessons));
    document.querySelectorAll('#lessons.input').forEach(i=>i.value='');
    showToast('✅ Lesson Saved!');
    loadLessons();
  }

  function loadLessons() {
    const lessonBody = document.getElementById('lessonBody');
    lessonBody.innerHTML = '';
    document.getElementById('totalLessons').innerText = lessons.length;

    lessons.forEach((l,i)=>{
      lessonBody.innerHTML += `
        <tr>
          <td>${l.grade}</td>
          <td>${l.subject}</td>
          <td>${l.title}</td>
          <td>
            <button class="btn btn-sm btn-edit" onclick="editLesson(${i})">Edit</button>
            <button class="btn btn-sm btn-delete" onclick="deleteLesson(${i})">Delete</button>
          </td>
        </tr>
      `;
    });
  }

  function editLesson(i) {
    const l = lessons[i];
    grade.value = l.grade; subject.value = l.subject; title.value = l.title;
    lessons.splice(i,1); // Edit karala save karaddi aluthen add wenawa
    showToast('✏️ Editing...');
  }

  function deleteLesson(i) {
    if(confirm('Delete this lesson?')) {
      lessons.splice(i,1);
      localStorage.setItem('siphala_lessons', JSON.stringify(lessons));
      loadLessons();
      showToast('🗑️ Deleted');
    }
  }

  function logout() { alert('Logout clicked'); }
</script>
</body>
</html>
