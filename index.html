<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIPHLA LK Admin</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
  body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  
  .glass { background: rgba(255,255,255,0.15); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.2); border-radius: 16px; }
  
  .login-box { width:100%; max-width: 400px; padding: 35px; text-align:center; }
  .login-box h1 { font-size:26px; margin-bottom:8px; }
  .login-box p { opacity:0.9; margin-bottom:25px; font-size:14px; }
  
  .input { width:100%; padding:14px; margin:10px 0; border:none; border-radius:10px; background: rgba(255,255,255,0.2); color:#fff; font-size:15px; }
  .input::placeholder{color:rgba(255,255,255,0.8)}
  .input:focus { outline:2px solid #8B5CF6; background: rgba(255,255,255,0.25); }
  
  .btn { width:100%; padding:14px; background: linear-gradient(90deg, #6366F1, #8B5CF6); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:600; font-size:16px; margin-top:5px; }
  .btn:hover { opacity:0.9; }
  
  .default-text { text-align:center; margin-top:15px; font-size:12px; opacity:0.7; }
  
  /* Dashboard */
  #dashboardScreen { display: none; width:100%; }
  .container { max-width: 1200px; margin: 0 auto; padding: 25px; color:#fff; }
  .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:25px; }
  .stats { display:grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 25px; }
  .card { padding: 22px; text-align:center; }
  .card h2 { font-size: 36px; font-weight: 700; }
  .section { padding: 25px; margin-bottom: 20px; }
  .tabs { display:flex; gap:10px; margin-bottom:20px; }
  .tab { padding:10px 18px; border-radius:10px; cursor:pointer; background: rgba(255,255,255,0.15); }
  .tab.active { background: #6366F1; }
  table { width:100%; border-collapse: collapse; }
  th, td { padding:12px; text-align:left; border-bottom: 1px solid rgba(255,255,255,0.1); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box glass">
    <h1>🔐 SIPHLA LK Admin</h1>
    <p>Login to Continue</p>
    <input type="email" id="email" class="input" placeholder="Admin Email">
    <input type="password" id="password" class="input" placeholder="Password">
    <button onclick="login()" class="btn">Login</button>
    <p id="errorMsg" style="color:#FECACA; margin-top:10px; font-size:14px;"></p>
    <p class="default-text">Default: siphalakofficial@gmail.com / Siphala@2026</p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboardScreen">
  <div class="container">
    <div class="header">
      <h1>📊 Dashboard</h1>
      <button onclick="logout()" class="btn" style="width:auto; padding:10px 20px; background:#EF4444;">Logout</button>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="showTab('dashboard', this)">Dashboard</div>
      <div class="tab" onclick="showTab('lessons', this)">Lessons</div>
    </div>

    <div id="dashboard" class="tabContent">
      <div class="stats">
        <div class="card glass"><h2 id="totalLessons">0</h2><p>Total Lessons</p></div>
        <div class="card glass"><h2>50,000+</h2><p>Students</p></div>
      </div>
    </div>

    <div id="lessons" class="tabContent" style="display:none;">
      <div class="section glass">
        <h2 style="margin-bottom:15px;">➕ Add New Lesson</h2>
        <input type="text" id="grade" class="input" placeholder="Grade">
        <input type="text" id="subject" class="input" placeholder="Subject">
        <input type="text" id="title" class="input" placeholder="Lesson Title">
        <button onclick="addLesson()" class="btn" style="width:auto;">Save Lesson</button>
        <p id="status" style="margin-top:10px;"></p>
      </div>
      <div class="section glass">
        <h2 style="margin-bottom:15px;">📝 All Lessons</h2>
        <table><thead><tr><th>Grade</th><th>Subject</th><th>Title</th><th>Action</th></tr></thead><tbody id="lessonBody"></tbody></table>
      </div>
    </div>
  </div>
</div>

<script>
  let ADMIN_EMAIL = "siphalakofficial@gmail.com";
  let ADMIN_PASSWORD = "Siphala@2026";
  let lessons = JSON.parse(localStorage.getItem('siphala_lessons')) || [];

  if(localStorage.getItem('adminLogin') === 'true') showDashboard();

  function login() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    if(email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
      localStorage.setItem('adminLogin', 'true');
      showDashboard();
    } else {
      document.getElementById('errorMsg').innerText = "❌ Wrong Email or Password";
    }
  }

  function logout() { localStorage.removeItem('adminLogin'); location.reload(); }

  function showDashboard() { 
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboardScreen').style.display = 'block';
    loadLessons(); 
  }

  function showTab(tab, el) { 
    document.querySelectorAll('.tabContent').forEach(e=>e.style.display='none'); 
    document.getElementById(tab).style.display='block'; 
    document.querySelectorAll('.tab').forEach(e=>e.classList.remove('active')); 
    el.classList.add('active');
  }

  function addLesson() {
    lessons.push({
      grade:document.getElementById('grade').value,
      subject:document.getElementById('subject').value,
      title:document.getElementById('title').value
    });
    localStorage.setItem('siphala_lessons', JSON.stringify(lessons));
    document.getElementById('status').innerText = "✅ Saved!";
    loadLessons();
  }

  function loadLessons() {
    const lessonBody = document.getElementById('lessonBody');
    lessonBody.innerHTML = ''; 
    document.getElementById('totalLessons').innerText = lessons.length;
    lessons.forEach((l,i)=>{
      lessonBody.innerHTML += `<tr><td>${l.grade}</td><td>${l.subject}</td><td>${l.title}</td><td><button onclick="lessons.splice(${i},1); loadLessons()" style="background:red; color:white; border:none; padding:5px 10px; border-radius:5px;">Delete</button></td></tr>`;
    });
  }
</script>
</body>
</html>
