<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIPHLA LK Admin</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
  body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height:100vh; color:#fff; }
  .glass { background: rgba(255,255,255,0.15); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.2); border-radius: 16px; }
  .login-box { max-width: 400px; margin: 100px auto; padding: 35px; }
  .input { width:100%; padding:14px; margin:12px 0; border:none; border-radius:10px; background: rgba(255,255,255,0.2); color:#fff; font-size:15px; }
  .input::placeholder{color:rgba(255,255,255,0.8)}
  .btn { width:100%; padding:14px; background: linear-gradient(90deg, #6366F1, #8B5CF6); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:600; font-size:16px; transition:0.3s; }
  .btn:hover { transform: translateY(-2px); }
  .container { max-width: 1200px; margin: 0 auto; padding: 25px; }
  .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:25px; }
  .stats { display:grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 25px; }
  .card { padding: 22px; text-align:center; }
  .card h2 { font-size: 36px; font-weight: 700; }
  .section { padding: 25px; margin-bottom: 20px; }
  .tabs { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
  .tab { padding:10px 18px; border-radius:10px; cursor:pointer; background: rgba(255,255,255,0.15); }
  .tab.active { background: linear-gradient(90deg, #6366F1, #8B5CF6); }
  table { width:100%; border-collapse: collapse; }
  th, td { padding:12px; text-align:left; border-bottom: 1px solid rgba(255,255,255,0.1); }
  #dashboardScreen { display: none; }
  .chart { height: 200px; display:flex; align-items:end; gap:8px; padding:20px; }
  .bar { background: linear-gradient(180deg, #8B5CF6, #6366F1); border-radius: 6px 6px 0 0; width: 100%; transition:0.5s; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box glass">
    <h1 style="text-align:center; font-size:28px; margin-bottom:8px;">🔐 SIPHLA LK Admin</h1>
    <p style="text-align:center; opacity:0.9; margin-bottom:20px; font-size:14px;">Login to Continue</p>
    <input type="email" id="email" class="input" placeholder="Admin Email">
    <input type="password" id="password" class="input" placeholder="Password">
    <button onclick="login()" class="btn">Login</button>
    <p id="errorMsg" style="color:#FECACA; text-align:center; margin-top:10px; font-size:14px;"></p>
    <p style="text-align:center; margin-top:15px; font-size:12px; opacity:0.7;">Default: siphalakofficial@gmail.com / Siphala@2026</p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboardScreen">
  <div class="container">
    <div class="header">
      <h1>📊 Admin Dashboard</h1>
      <button onclick="logout()" class="btn" style="width:auto; padding:10px 20px; background: linear-gradient(90deg, #EF4444, #F87171);">Logout</button>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="showTab('dashboard', this)">Dashboard</div>
      <div class="tab" onclick="showTab('lessons', this)">Lessons</div>
      <div class="tab" onclick="showTab('settings', this)">Settings</div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="tabContent">
      <div class="stats">
        <div class="card glass"><h2 id="totalLessons">0</h2><p>Total Lessons</p></div>
        <div class="card glass"><h2>50,000+</h2><p>Students</p></div>
        <div class="card glass"><h2>+24%</h2><p>This Month</p></div>
      </div>
      <div class="section glass">
        <h2 style="margin-bottom:15px;">📈 Weekly Activity</h2>
        <div class="chart" id="chart"></div>
      </div>
    </div>

    <!-- LESSONS -->
    <div id="lessons" class="tabContent" style="display:none;">
      <div class="section glass">
        <h2 style="margin-bottom:15px;">➕ Add New Lesson</h2>
        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap:12px;">
          <select id="grade" class="input"><option value="">Grade</option><option>3</option><option>4</option><option>5</option><option>10</option><option>11</option><option>A/L</option></select>
          <input type="text" id="subject" class="input" placeholder="Subject">
          <input type="text" id="title" class="input" placeholder="Lesson Title">
          <input type="url" id="youtube" class="input" placeholder="YouTube Link">
        </div>
        <button onclick="addLesson()" class="btn" style="margin-top:15px; width:auto;">Save Lesson</button>
        <p id="status" style="margin-top:10px;"></p>
      </div>
      <div class="section glass">
        <h2 style="margin-bottom:15px;">📝 All Lessons</h2>
        <table><thead><tr><th>Grade</th><th>Subject</th><th>Title</th><th>Action</th></tr></thead><tbody id="lessonBody"></tbody></table>
      </div>
    </div>

    <!-- SETTINGS -->
    <div id="settings" class="tabContent" style="display:none;">
      <div class="section glass">
        <h2 style="margin-bottom:15px;">⚙️ Settings</h2>
        <input type="password" id="newPass" class="input" placeholder="New Password">
        <button onclick="changePassword()" class="btn" style="width:auto;">Update Password</button>
        <p id="passStatus" style="margin-top:10px;"></p>
      </div>
    </div>
  </div>
</div>

<script>
  let ADMIN_EMAIL = "siphalakofficial@gmail.com";
  let ADMIN_PASSWORD = localStorage.getItem('adminPass') || "Siphala@2026";
  let lessons = JSON.parse(localStorage.getItem('siphala_lessons')) || [];

  window.onload = function() {
    if(localStorage.getItem('adminLogin') === 'true') showDashboard();
  }

  function login() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    if(email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
      localStorage.setItem('adminLogin', 'true');
      document.getElementById('errorMsg').innerText = "";
      showDashboard();
    } else {
      document.getElementById('errorMsg').innerText = "❌ Wrong Email or Password";
    }
  }

  function logout() { 
    localStorage.removeItem('adminLogin'); 
    location.reload(); 
  }

  function showDashboard() { 
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboardScreen').style.display = 'block';
    loadLessons(); 
    drawChart();
  }

  function showTab(tab, el) { 
    document.querySelectorAll('.tabContent').forEach(e=>e.style.display='none'); 
    document.getElementById(tab).style.display='block'; 
    document.querySelectorAll('.tab').forEach(e=>e.classList.remove('active')); 
    el.classList.add('active');
  }

  function addLesson() {
    const grade = document.getElementById('grade').value;
    const subject = document.getElementById('subject').value;
    const title = document.getElementById('title').value;
    const youtube = document.getElementById('youtube').value;
    if(!grade || !subject || !title) { alert('Please fill all fields'); return; }
    
    lessons.push({grade, subject, title, youtube});
    localStorage.setItem('siphala_lessons', JSON.stringify(lessons));
    document.getElementById('status').innerText = "✅ Lesson Saved!";
    document.getElementById('status').style.color = "#4ADE80";
    document.querySelectorAll('#lessons .input').forEach(i=>i.value='');
    loadLessons();
  }

  function loadLessons() {
    const lessonBody = document.getElementById('lessonBody');
    lessonBody.innerHTML = ''; 
    document.getElementById('totalLessons').innerText = lessons.length;
    lessons.forEach((l,i)=>{
      lessonBody.innerHTML += `<tr><td>${l.grade}</td><td>${l.subject}</td><td>${l.title}</td><td><button onclick="deleteLesson(${i})" class="btn" style="padding:6px 12px; width:auto; font-size:12px; background:red;">Delete</button></td></tr>`;
    });
  }
  
  function deleteLesson(i) {
    if(confirm('Delete this lesson?')) {
      lessons.splice(i,1); 
      localStorage.setItem('siphala_lessons', JSON.stringify(lessons));
      loadLessons();
    }
  }

  function drawChart() {
    const data = [40, 65, 80, 100, 60, 75, 90]; // fake data
    const chart = document.getElementById('chart');
    chart.innerHTML = '';
    data.forEach(h=>{
      chart.innerHTML += `<div class="bar" style="height:${h}%;"></div>`;
    });
  }

  function changePassword() {
    const newPass = document.getElementById('newPass').value;
    if(newPass.length < 6) { alert('Password too short'); return; }
    localStorage.setItem('adminPass', newPass);
    ADMIN_PASSWORD = newPass;
    document.getElementById('passStatus').innerText = "✅ Password Updated";
    document.getElementById('passStatus').style.color = "#4ADE80";
  }
</script>
</body>
</html>
