<!DOCTYPE html>
<html>
<head>
<title>siphla lk</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --text:#e2e8f0;
  --accent:#3b82f6;
  --accent2:#8b5cf6;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{background:var(--bg); color:var(--text);}

.header{padding:30px 20px; text-align:center; background:linear-gradient(135deg,var(--accent),var(--accent2));}
.header h1{font-size:32px; font-weight:700;}
.header p{opacity:0.9; margin-top:5px;}

.container{max-width:1100px; margin:30px auto; padding:0 20px;}
.grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:20px;}

.card{
  background:var(--card); border-radius:16px; padding:25px;
  cursor:pointer; transition:0.3s; border:1px solid #334155;
}
.card:hover{transform:translateY(-5px); border-color:var(--accent); box-shadow:0 10px 30px rgba(59,130,246,0.2);}

.btn{padding:12px 24px; background:var(--accent); border:none; color:white; border-radius:10px; cursor:pointer; font-weight:600;}
.btn:hover{background:#2563eb;}

.input{width:100%; padding:14px; background:#334155; border:1px solid #475569; border-radius:10px; color:var(--text); margin:8px 0;}
iframe{width:100%; border-radius:12px; border:none;}
</style>
</head>
<body>

<div class="header">
  <h1>🎓 siphla lk</h1>
  <p>smart learning platform</p>
</div>

<div id="app" class="container"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
var firebaseconfig = { apikey: "AIzaSyAs_3J2P6Sm6OBCQrnpWERusIOQWnFBX8w", authdomain: "siphala-lk.firebaseapp.com", databaseurl: "https://siphala-lk-default-rtdb.asia-southeast1.firebasedatabase.app", projectid: "siphala-lk" };
firebase.initializeapp(firebaseconfig); var db = firebase.database(); var alllessons = [];

showgrades();
function getyoutubeid(url){ if(!url) return ''; var regexp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/; var match = url.match(regexp); return (match&&match[7].length==11)? match[7] : ''; }

function showgrades(){
  db.ref('lessons').on('value', function(snapshot) {
    alllessons = []; snapshot.foreach(function(child) { var l = child.val(); l.key = child.key; alllessons.push(l); });
    var grades = [...new set(alllessons.map(l => l.grade))].sort();
    var html = `<h2 style="margin-bottom:20px">select your grade</h2><div class="grid">`;
    grades.foreach((g,i) => {
      html += `<div onclick="showsubjects('${g}')" class="card"><h3 style="font-size:24px">📘 ${g}</h3><p style="opacity:0.7;margin-top:8px">${alllessons.filter(x=>x.grade==g).length} subjects</p></div>`;
    });
    html += `</div><div style="text-align:center;margin-top:30px"><a href="admin.html" style="color:var(--accent)">teacher login</a></div>`;
    app.innerhtml = html;
  });
}

function showsubjects(grade){
  var subjects = [...new set(alllessons.filter(l => l.grade == grade).map(l => l.subject))];
  var html = `<button onclick="showgrades()" class="btn">← back</button><h2 style="margin:20px 0">${grade}</h2><div class="grid">`;
  subjects.foreach(s => {
    html += `<div onclick="showlessons('${grade}','${s}')" class="card"><h3>📚 ${s}</h3><p style="opacity:0.7;margin-top:8px">${alllessons.filter(x=>x.grade==grade&&x.subject==s).length} lessons</p></div>`;
  });
  html += '</div>'; app.innerhtml = html;
}

function showlessons(grade, subject){
  var lessons = alllessons.filter(l => l.grade == grade && l.subject == subject);
  var html = `<button onclick="showsubjects('${grade}')" class="btn">← back</button><h2 style="margin:20px 0">${subject}</h2>`;
  lessons.foreach(l => {
    var videoid = getyoutubeid(l.ytlink);
    var thumb = videoid? `https://img.youtube.com/vi/${videoid}/hqdefault.jpg` : '';
    html += `<div onclick="playlesson('${l.key}')" class="card" style="display:flex;gap:15px;align-items:center;padding:15px">
      <img src="${thumb}" style="width:120px;height:90px;object-fit:cover;border-radius:8px">
      <div><h3>${l.title}</h3><p style="opacity:0.7;font-size:14px">${l.description || ''}</p></div>
    </div>`;
  });
  app.innerhtml = html;
}

function playlesson(key){
  var l = alllessons.find(x => x.key == key);
  var videoid = getyoutubeid(l.ytlink);
  var embedlink = videoid? 'https://www.youtube-nocookie.com/embed/' + videoid : '';
  var html = `<button onclick="showlessons('${l.grade}','${l.subject}')" class="btn">← back</button>`;
  html += `<h2 style="margin:20px 0">${l.title}</h2>`;
  html += `<div class="card" style="padding:0;overflow:hidden"><iframe height="500" src="${embedlink}?autoplay=1" allowfullscreen></iframe></div>`;
  if(l.description) html += `<div class="card"><p>${l.description}</p></div>`;
  app.innerhtml = html;
}
</script>
</body>
</html>
