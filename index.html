<!DOCTYPE html>
<html>
<head>
<title>SIPHLA LK</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;font-family:Arial;margin:0;padding:0">

<div id="app"></div>

<!-- Firebase v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
var firebaseConfig = {
  apiKey: "AIzaSyAs_3J2P6Sm6OBCQrnpWERusIOQWnFBX8w",
  authDomain: "siphala-lk.firebaseapp.com",
  databaseURL: "https://siphala-lk-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "siphala-lk"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();
var allLessons = [];

// Patan gattama direct grades pennawa
showGrades();

function getYouTubeID(url){
  if(!url) return '';
  var regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/;
  var match = url.match(regExp);
  return (match&&match[7].length==11)? match[7] : '';
}

function showGrades(){
  db.ref('lessons').on('value', function(snapshot) {
    allLessons = [];
    snapshot.forEach(function(child) {
      var l = child.val(); l.key = child.key; allLessons.push(l);
    });
    var grades = [...new Set(allLessons.map(l => l.grade))].sort();
    var html = '<h2 style="text-align:center;padding-top:20px">📚 SIPHLA LK - Select Grade</h2><div style="padding:20px;display:grid;grid-template-columns:repeat(3,1fr);gap:15px">';
    grades.forEach(g => {
      html += `<div onclick="showSubjects('${g}')" style="background:white;color:#333;padding:30px;border-radius:12px;text-align:center;cursor:pointer;font-weight:bold">${g}</div>`;
    });
    html += '</div>';
    app.innerHTML = html;
  });
}

function showSubjects(grade){
  var subjects = [...new Set(allLessons.filter(l => l.grade == grade).map(l => l.subject))];
  var html = `<button onclick="showGrades()" style="margin:15px;padding:10px;border:none;border-radius:8px;cursor:pointer">← Back</button><h2 style="text-align:center">Select Subject</h2><div style="padding:20px">`;
  subjects.forEach(s => {
    html += `<div onclick="showLessons('${grade}','${s}')" style="background:white;color:#333;padding:20px;margin:10px 0;border-radius:12px;cursor:pointer;font-weight:bold">${s}</div>`;
  });
  html += '</div>';
  app.innerHTML = html;
}

function showLessons(grade, subject){
  var lessons = allLessons.filter(l => l.grade == grade && l.subject == subject);
  var html = `<button onclick="showSubjects('${grade}')" style="margin:15px;padding:10px;border:none;border-radius:8px;cursor:pointer">← Back</button><h2 style="text-align:center">Select Lesson</h2><div style="padding:20px">`;
  lessons.forEach(l => {
    html += `<div onclick="playLesson('${l.key}')" style="background:rgba(255,255,255,0.2);padding:20px;margin:10px 0;border-radius:15px;cursor:pointer"><h3>${l.title}</h3></div>`;
  });
  html += '</div>';
  app.innerHTML = html;
}

function playLesson(key){
  var l = allLessons.find(x => x.key == key);
  var videoID = getYouTubeID(l.ytlink);
  var embedLink = videoID? 'https://www.youtube-nocookie.com/embed/' + videoID : '';
  var html = `<button onclick="showLessons('${l.grade}','${l.subject}')" style="margin:15px;padding:10px;border:none;border-radius:8px;cursor:pointer">← Back</button><div style="padding:20px"><h2>${l.title}</h2>`;
  html += `<iframe width="100%" height="400" src="${embedLink}?autoplay=1" frameborder="0" allowfullscreen style="border-radius:12px"></iframe>`;
  if(l.description) html += `<p style="margin-top:15px">${l.description}</p>`;
  html += `</div>`;
  app.innerHTML = html;
}
</script>
</body>
</html>
