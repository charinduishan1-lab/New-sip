<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIPHLA LK Admin</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
  body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height:100vh; color:#fff; padding:15px; }
.login-container { display:flex; align-items:center; justify-content:center; min-height:100vh; }
.glass { background: rgba(255,255,255,0.15); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.2); border-radius: 16px; }
.login-box { width:100%; max-width: 400px; padding: 35px; text-align:center; }
.input { width:100%; padding:14px; margin:10px 0; border:none; border-radius:10px; background: rgba(255,255,255,0.2); color:#fff; }
.btn { width:100%; padding:14px; background: linear-gradient(90deg, #6366F1, #8B5CF6); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:600; }
 #dashboardScreen { display: none; }
.header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
.logout { padding:10px 18px; background:#EF4444; color:white; border:none; border-radius:10px; cursor:pointer; width:auto; }
.section { padding: 20px; margin-bottom: 20px; }
.table-wrapper { overflow-x: auto; width:100%; }
 table { width:100%; min-width: 500px; border-collapse: collapse; }
 th, td { padding:14px 10px; white-space: nowrap; }
.btn-sm { padding:8px 12px; font-size:13px; margin:2px; width:auto; }
.btn-delete { background:#EF4444; }
</style>
</head>
<body>

<div id="loginScreen" class="login-container">
  <div class="login-box glass">
    <h1>🔐 SIPHLA LK Admin</h1>
    <input type="email" id="email" class="input" placeholder="Admin Email">
    <input type="password" id="password" class="input" placeholder="Password">
    <button onclick="login()" class="btn">Login</button>
    <p id="errorMsg" style="color:#FECACA; margin-top:10px;"></p>
  </div>
</div>

<div id="dashboardScreen">
  <div class="header">
    <h1>📊 Dashboard</h1>
    <button onclick="logout()" class="logout">Logout</button>
  </div>

  <div class="section glass">
    <h2>➕ Add New Lesson</h2>
    <input type="text" id="grade" class="input" placeholder="Grade">
    <input type="text" id="subject" class="input" placeholder="Subject">
    <input type="text" id="title" class="input" placeholder="Lesson Title">
    <button onclick="addLesson()" class="btn" style="width:auto;">Save Lesson</button>
    <p id="status"></p>
  </div>

  <div class="section glass">
    <h2>📝 All Lessons</h2>
    <div class="table-wrapper">
      <table><thead><tr><th>Grade</th><th>Subject</th><th>Title</th><th>Action</th></tr></thead><tbody id="lessonBody"></tbody></table>
    </div>
  </div>
</div>

<script>
  const ADMIN_EMAIL = "siphalakofficial@gmail.com";
  const ADMIN_PASSWORD = "Siphala@2026";
  let lessons = [];

  const DATA_URL = '/data.json'; // Vercel eke data file eka

  window.onload = function() {
    if(localStorage.getItem('adminLogin') === 'true') showDashboard();
    loadLessonsFromServer();
  }

  async function loadLessonsFromServer() {
    try {
      const res = await fetch(DATA_URL + '?t=' + Date.now()); // cache break
      lessons = await res.json();
      loadLessons();
    } catch(e) { console.log('No data yet') }
  }

  async function saveLessonsToServer() {
    // NOTE: Vercel eke free plan eke file write karanna ba. 
    // E nisa meka "GitHub API" ekakin karanna ona. 
    // Danata mokada wenne kiyanne: me phone eke witharak penawa
    localStorage.setItem('siphala_lessons', JSON.stringify(lessons)); // backup
    document.getElementById('status').innerText = '⚠️ Vercel eke direct save karanna ba. GitHub API ona.';
  }

  function login() {
    if(document.getElementById('email').value === ADMIN_EMAIL && document.getElementById('password').value === ADMIN_PASSWORD) {
      localStorage.setItem('adminLogin', 'true');
      showDashboard();
    } else {
      document.getElementById('errorMsg').innerText = "❌ Wrong Email or Password";
    }
  }

  function logout() {
    localStorage.removeItem('adminLogin');
    location.reload();
  }

  function showDashboard() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboardScreen').style.display = 'block';
  }

  function addLesson() {
    lessons.push({
      grade:grade.value, subject:subject.value, title:title.value
    });
    saveLessonsToServer();
    grade.value=''; subject.value=''; title.value='';
    loadLessons();
  }

  function loadLessons() {
    const lessonBody = document.getElementById('lessonBody');
    lessonBody.innerHTML = '';
    lessons.forEach((l,i)=>{
      lessonBody.innerHTML += `<tr><td>${l.grade}</td><td>${l.subject}</td><td>${l.title}</td><td><button class="btn btn-sm btn-delete" onclick="deleteLesson(${i})">Delete</button></td></tr>`;
    });
  }

  function deleteLesson(i) {
    lessons.splice(i,1);
    saveLessonsToServer();
    loadLessons();
  }
</script>
</body>
</html>
