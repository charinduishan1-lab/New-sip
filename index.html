<!DOCTYPE html>
<html>
<head>
<title>SIPHLA Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="background:#667eea;color:#fff;font-family:Arial;padding:20px">

<h1>📊 SIPHLA LK Admin Panel</h1>

<div style="background:rgba(255,255,255,0.2);padding:20px;border-radius:15px;margin-bottom:20px">
  <h2>➕ Add New Lesson</h2>
  <input id="grade" placeholder="Grade: 10, 11, A/L" style="width:95%;padding:12px;margin:5px 0;border:none;border-radius:8px">
  <input id="subject" placeholder="Subject" style="width:95%;padding:12px;margin:5px 0;border:none;border-radius:8px">
  <input id="title" placeholder="Lesson Title" style="width:95%;padding:12px;margin:5px 0;border:none;border-radius:8px">
  <button id="saveBtn" style="padding:12px 20px;background:#8B5CF6;color:white;border:none;border-radius:8px;cursor:pointer;font-weight:bold">Save Lesson</button>
  <p id="status"></p>
</div>

<div style="background:rgba(255,255,255,0.2);padding:20px;border-radius:15px">
  <h2>📝 All Lessons</h2>
  <div id="list"></div>
</div>


<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
var firebaseConfig = {
  apiKey: "AIzaSyA_3J2P4S6A0BCQrnqMEruS10QNwFBX8w",
  databaseURL: "https://siphala-lk-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "siphala-lk"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();
var lessonsRef = db.ref('lessons');

// Save
document.getElementById('saveBtn').onclick = function() {
  var grade = document.getElementById('grade').value;
  var subject = document.getElementById('subject').value;
  var title = document.getElementById('title').value;
  
  if(!grade || !subject || !title){ alert('Fill all fields'); return; }
  
  status.innerText = "Saving...";
  lessonsRef.push({grade:grade, subject:subject, title:title}).then(function(){
    status.innerText = "✅ Saved Successfully!";
    document.getElementById('grade').value='';
    document.getElementById('subject').value='';
    document.getElementById('title').value='';
  }).catch(function(e){
    status.innerText = "❌ Error: " + e.message;
  });
}

// Load
lessonsRef.on('value', function(snapshot) {
  var html = '';
  snapshot.forEach(function(child) {
    var l = child.val();
    var key = child.key;
    html += '<div style="background:rgba(0,0,0,0.2);padding:15px;border-radius:10px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">';
    html += '<div><b>' + l.title + '</b><br><small>Grade ' + l.grade + ' - ' + l.subject + '</small></div>';
    html += '<button onclick="delLesson(\'' + key + '\')" style="padding:10px 15px;background:#EF4444;color:white;border:none;border-radius:8px;cursor:pointer;font-weight:bold">Delete</button>';
    html += '</div>';
  });
  document.getElementById('list').innerHTML = html || '<p>No lessons yet</p>';
});

// Delete
function delLesson(key) {
  if(confirm('Delete this lesson?')){
    db.ref('lessons/' + key).remove();
  }
}
</script>
</body>
</html>
