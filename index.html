<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIPHLA LK Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
  body{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;color:#fff}
 .container{max-width:1200px;margin:0 auto;padding:20px}
 .card{background:rgba(255,255,255,0.1);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.2);border-radius:20px;padding:25px;margin-bottom:20px}
 .card h2{font-size:20px;margin-bottom:15px}
 .input{width:100%;padding:15px;margin:10px 0;border:none;border-radius:12px;background:rgba(255,255,255,0.15);color:#fff;font-size:15px;outline:none}
 .btn{padding:15px;background:linear-gradient(90deg,#6366F1,#8B5CF6);color:white;border:none;border-radius:12px;cursor:pointer;font-weight:600;font-size:16px}
 .grid{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:10px}
 .table-wrap{overflow-x:auto}
 table{width:100%;min-width:600px;border-collapse:collapse}
 th,td{padding:15px;text-align:left;white-space:nowrap}
 th{opacity:0.9;font-weight:600;border-bottom:1px solid rgba(255,255,255,0.2)}
 .btn-sm{padding:8px 14px;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-size:13px;background:#EF4444;color:#fff}
 .toast{position:fixed;top:20px;right:20px;background:#4ADE80;color:#000;padding:15px 20px;border-radius:12px;font-weight:600;display:none;z-index:999}
 .header{text-align:center;margin-bottom:30px}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<div class="container">
  <div class="header">
    <h1>📊 SIPHLA LK Admin Panel</h1>
    <p>Lessons Manage Karanna</p>
  </div>
  
  <div class="card">
    <h2>➕ Add New Lesson</h2>
    <div class="grid">
      <input type="text" id="grade" class="input" placeholder="Grade: 10, 11, A/L">
      <input type="text" id="subject" class="input" placeholder="Subject">
      <input type="text" id="title" class="input" placeholder="Lesson Title">
      <button onclick="addLesson()" class="btn">Save</button>
    </div>
  </div>
  
  <div class="card">
    <h2>📝 All Lessons <span id="count" style="font-size:14px;opacity:0.8"></span></h2>
