<!DOCTYPE html>
<html>
<head>
<title>SIPHLA LK - Lessons</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;font-family:Arial;padding:20px;text-align:center">

<h1>📚 SIPHLA LK</h1>
<p>Free Lessons for Grade 6 - A/L</p>

<div id="lessons" style="max-width:800px;margin:30px auto;text-align:left"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
var firebaseConfig = {
  apiKey: "AIzaSyA_3J2P4S6A0BCQrnqMEruS10QNwFBX8w",
  databaseURL: "https://siphala-lk-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "siphala-lk"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();
var lessonsRef = db.ref('lessons');

lessonsRef.on('value', function(snapshot) {
  var html = '';
  if(snapshot.numChildren() == 0){ html = '<p style="text-align:center">No lessons yet. Check back later.</p>' }
  
  snapshot.forEach(function(child) {
    var l = child.val();
    var ytButton = '';
    if(l.ytlink && l.ytlink != ''){
      ytButton = '<a href="' + l.ytlink + '" target="_blank" style="display:inline-block;padding:10px 18px;background:#FF0000;color:white;border:none;border-radius:8px;text-decoration:none;font-weight:bold;margin-top:10px">▶️ Watch on YouTube</a>';
    }
    
    html += '<div style="background:rgba(255,255,255,0.15);padding:20px;border-radius:15px;margin-bottom:15px">';
    html += '<span style="background:#8B5CF6;padding:5px 12px;border-radius:20px;font-size:12px">Grade ' + l.grade + '</span>';
    html += '<h3 style="margin:10px 0">' + l.title + '</h3>';
    html += '<p style="opacity:0.9">' + l.subject + '</p>';
    html += ytButton;
    html += '</div>';
  });
  lessons.innerHTML = html;
});
</script>
</body>
</html>
