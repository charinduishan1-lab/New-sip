<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIPHLA LK Admin</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Poppins', sans-serif; }
  body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height:100vh; color:#fff; }
  .glass { background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; }
  .login-box { max-width: 420px; margin: 100px auto; padding: 40px; }
  .input { width:100%; padding:14px; margin:12px 0; border:none; border-radius:12px; background: rgba(255,255,255,0.15); color:#fff; font-size:16px; }
  .input::placeholder{color:rgba(255,255,255,0.7)}
  .btn { width:100%; padding:14px; background: linear-gradient(90deg, #6366F1, #8B5CF6); color:white; border:none; border-radius:12px; cursor:pointer; font-weight:600; font-size:16px; }
  .btn:hover { transform: translateY(-2px); }
  .container { max-width: 1400px; margin: 0 auto; padding: 30px; }
  .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; }
  .stats { display:grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; margin-bottom: 30px; }
  .card { padding: 25px; }
  .section { padding: 30px; margin-bottom: 25px; }
  .tabs { display:flex; gap:12px; margin-bottom:25px; }
  .tab { padding:12px 24px; border-radius:12px; cursor:pointer; background: rgba(255,255,255,0.1); }
  .tab.active { background: linear-gradient(90deg, #6366F1, #8B5CF6); }
  table { width:100%; border-collapse: collapse; }
  th, td { padding:14px; text-align:left; }
  #dashboardScreen { display: none; } /* Important */
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box glass">
    <h1 style="text-align:center; font-size:32px; margin-bottom:10px;">✨ SIPHLA LK Pro</h1>
    <p style="text-align:center; opacity:0.8; margin-bottom:25px;">Admin Control Center</p>
    <input type="email" id="email" class="input" placeholder="Admin Email" value="siphalakofficial@gmail.com">
    <input type="password" id="password" class="input" placeholder="Password" value="Siphala@2026">
    <button onclick="login()" class="btn">Login →</button>
    <p id="errorMsg" style="color:#F87171; text-align:center; margin-top:10px;"></p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboardScreen">
  <div class="container">
    <div class="header">
      <h1>📊 Dashboard Overview</h1>
      <button onclick="logout()" class="btn" style="width:auto; background: linear-gradient(90deg, #EF4444, #F87171);">Logout</button>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="showTab('dashboard', this)">Dashboard</div>
      <div class="tab" onclick="showTab('lessons', this)">Lessons</div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="tabContent">
      <div class="stats">
        <div class="card glass"><h2 id="totalLessons">0</h2><p>Total Lessons</p></div>
        <div class="card glass"><h2>50,000+</h2><p>Students</p></div>
      </div>
      <div class="section glass">
        <h2>📈 Student Activity</h2>
        <canvas id="activityChart"></canvas>
      </div>
    </div>

    <!-- LESSONS -->
    <div id="lessons" class="tabContent" style="display:none;">
      <div class="section glass">
        <h2>➕ Add New Lesson</h2>
        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:15px;">
          <select id="grade" class="input"><option>Grade</option><option>10</option><option>11</option><option>A/L</option></select>
          <input type="text" id="subject" class="input" placeholder="Subject">
          <input type="text" id="title" class="input" placeholder="Lesson Title">
        </div>
        <button onclick="addLesson()" class="btn" style="margin-top:15px; width:auto;">Publish Lesson 🚀</button>
        <p id="status"></p>
      </div>
      <div class="section glass">
        <h2>📝 All Lessons</h2>
        <table><thead><tr><th>Grade</th><th>Subject</th><th>Title</th><th>Action</th></tr></thead><tbody id="lessonBody"></tbody></table>
      </div>
    </div>
  </div>
</div>

<script>
  const ADMIN_EMAIL = "siphalakofficial@gmail.com";
  const ADMIN_PASSWORD = "Siphala@2026";
  let lessons = JSON.parse(localStorage.getItem('siphala_lessons')) || [];

  // Page load වෙනකොට check කරනවා
  window.onload = function() {
    if(localStorage.getItem('adminLogin') === 'true') {
      showDashboard();
    }
  }

  function login() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errorMsg = document.getElementById('errorMsg');
    
    if(email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
      localStorage.setItem('adminLogin', 'true');
      errorMsg.innerText = "";
      showDashboard();
    } else {
      errorMsg.innerText = "❌ වැරදි Email හෝ Password";
    }
  }

  function logout() { 
    localStorage.removeItem('adminLogin'); 
    location.reload(); 
  }

  function showDashboard() { 
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboardScreen').style.display = 'block';
    loadLessons(); 
    initCharts();
  }

  function showTab(tab, el) { 
    document.querySelectorAll('.tabContent').forEach(e=>e.style.display='none'); 
    document.getElementById(tab).style.display='block'; 
    document.querySelectorAll('.tab').forEach(e=>e.classList.remove('active')); 
    el.classList.add('active');
  }

  function addLesson() {
    const lesson = {
      grade:document.getElementById('grade').value, 
      subject:document.getElementById('subject').value, 
      title:document.getElementById('title').value
    };
    lessons.push(lesson);
    localStorage.setItem('siphala_lessons', JSON.stringify(lessons));
    document.getElementById('status').innerText = "✅ Lesson Added";
    loadLessons();
  }

  function loadLessons() {
    const lessonBody = document.getElementById('lessonBody');
    lessonBody.innerHTML = ''; 
    document.getElementById('totalLessons').innerText = lessons.length;
    lessons.forEach((l,i)=>{
      lessonBody.innerHTML += `<tr><td>${l.grade}</td><td>${l.subject}</td><td>${l.title}</td><td><button onclick="deleteLesson(${i})" class="btn" style="padding:8px 12px; width:auto; background:red;">Delete</button></td></tr>`;
    });
  }
  
  function deleteLesson(i) {
    lessons.splice(i,1); 
    localStorage.setItem('siphala_lessons', JSON.stringify(lessons));
    loadLessons();
  }

  function initCharts() {
    const ctx = document.getElementById('activityChart');
    if(ctx) {
      new Chart(ctx, {
        type: 'line',
        data: { labels: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'], datasets: [{label:'Students Online', data:[1200,1900,3000,5000,2300,3200,4100], borderColor:'#8B5CF6', tension:0.4, fill:true}] },
        options: { responsive:true, plugins:{legend:{labels:{color:'#fff'}}}, scales:{x:{ticks:{color:'#fff'}}, y:{ticks:{color:'#fff'}}}
      });
    }
  }
</script>
</body>
</html>
