<!DOCTYPE html>
<html>
<head>
<title>SIPHLA Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;font-family:Poppins;padding:20px}
.glass{background:rgba(255,255,255,0.1);padding:20px;border-radius:15px;margin:10px 0}
input,button{padding:14px;margin:5px;border-radius:10px;border:none;font-size:16px;width:200px}
button{background:#8B5CF6;color:#fff;cursor:pointer;font-weight:600}
#log{background:#000;color:#0f0;padding:15px;border-radius:10px;font-family:monospace}
</style>
</head>
<body>
<h1>📊 SIPHLA Admin - Firebase Debug</h1>

<div class="glass">
  <h3>Add Lesson</h3>
  <input id="grade" placeholder="Grade">
  <input id="subject" placeholder="Subject"> 
  <input id="title" placeholder="Title">
  <button onclick="save()">Save to Firebase</button>
  <p id="status">Status: Waiting...</p>
</div>

<div class="glass">
  <h3>Live Lessons</h3>
  <div id="list">Loading...</div>
</div>

<div class="glass">
  <h3>Error Log</h3>
  <pre id="log"></pre>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

function log(msg){ document.getElementById('log').innerText += msg + '\n'; }

const app = initializeApp({
  apiKey: "AIzaSyA_3J2P4S6A0BCQrnqMEruS10QNwFBX8w",
  databaseURL: "https://siphala-lk-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "siphala-lk"
});
const db = getDatabase(app);
log("✅ Firebase Connected");

const dbRef = ref(db, 'lessons');

window.save = function(){
  status.innerText = "Status: Saving...";
  log("Trying to save...");
  push(dbRef, {
    grade: grade.value, 
    subject: subject.value, 
    title: title.value,
    time: Date.now()
  }).then(()=>{
    status.innerText = "✅ Saved Successfully!";
    log("✅ Save Success");
    grade.value='';subject.value='';title.value='';
  }).catch((e)=>{
    status.innerText = "❌ Save Failed!";
    log("❌ ERROR: " + e.code + " - " + e.message); // meka wada
  });
}

onValue(dbRef, (snap)=>{
  let html = '';
  snap.forEach(child=>{
    let l = child.val();
    html += `<p><b>${l.grade}</b> - ${l.subject} - ${l.title}</p>`
  });
  list.innerHTML = html || 'No lessons yet';
  log("✅ Data Loaded");
}, (e)=>{
  log("❌ READ ERROR: " + e.message);
});
</script>
</body>
</html>
