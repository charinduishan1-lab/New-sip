<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIPHLA LK Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;color:#fff;padding:15px}
.login-container{display:flex;align-items:center;justify-content:center;min-height:100vh}
.glass{background:rgba(255,255,255,0.15);backdrop-filter:blur(15px);border:1px solid rgba(255,255,255,0.2);border-radius:16px}
.login-box{width:100%;max-width:400px;padding:35px;text-align:center}
.input{width:100%;padding:14px;margin:10px 0;border:none;border-radius:10px;background:rgba(255,255,255,0.2);color:#fff}
.btn{width:100%;padding:14px;background:linear-gradient(90deg,#6366F1,#8B5CF6);color:white;border:none;border-radius:10px;cursor:pointer;font-weight:600}
#dashboardScreen{display:none}.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.logout{padding:10px 18px;background:#EF4444;color:white;border:none;border-radius:10px;cursor:pointer;width:auto}
.section{padding:20px;margin-bottom:20px}.table-wrapper{overflow-x:auto;width:100%}
table{width:100%;min-width:500px;border-collapse:collapse}th,td{padding:14px 10px;white-space:nowrap}
.btn-sm{padding:8px 12px;font-size:13px;margin:2px;width:auto}.btn-delete{background:#EF4444}
.toast{position:fixed;top:20px;right:20px;background:#4ADE80;color:#000;padding:14px 20px;border-radius:10px;font-weight:600;display:none;z-index:999}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<div id="loginScreen" class="login-container">
  <div class="login-box glass">
    <h1>🔐 SIPHLA LK Admin</h1>
    <input type="email" id="email" class="input" placeholder="Admin Email">
    <input type="password" id="password" class="input" placeholder="Password">
    <button onclick="login()" class="btn">Login</button>
    <p id="errorMsg" style="color:#FECACA;margin-top:10px;"></p>
  </div>
</div>

<div id="dashboardScreen">
  <div class="header"><h1>📊 Dashboard</h1><button onclick="logout()" class="logout">Logout</button></div>
  <div class="section glass">
    <h2>➕ Add New Lesson</h2>
    <input type="text" id="grade" class="input" placeholder="Grade e.g: 10">
    <input type="text" id="subject" class="input" placeholder="Subject e.g: Buddhism">
    <input type="text" id="title" class="input" placeholder="Lesson Title">
    <button onclick="addLesson()" class="btn" style="width:auto;">Save Lesson</button>
  </div>
  <div class="section glass">
    <h2>📝 All Lessons - Live Sync</h2>
    <div class="table-wrapper"><table><thead><tr><th>Grade</th><th>Subject</th><th>Title</th><th>Action</th></tr></thead><tbody id="lessonBody"></tbody></table></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA_3J2P4S6A0BCQrnqMEruS10QNwFBX8w",
    authDomain: "siphala-lk.firebaseapp.com",
    databaseURL: "https://siphala-lk-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "siphala-lk",
    storageBucket: "siphala-lk.appspot.com",
    messagingSenderId: "1005401585483",
    appId: "1:1005401585483:web:42a43872bd2b10213849a4",
    measurementId: "G-BDGTVK2GOP"
  };

  const ADMIN_EMAIL = "siphalakofficial@gmail.com";
  const ADMIN_PASSWORD = "Siphala@2026";

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const lessonsRef = ref(db, 'lessons');

  window.onload = () => {
    if(localStorage.getItem('adminLogin') === 'true') showDashboard();
    loadLessons();
  }

  function loadLessons() {
    onValue(lessonsRef, (snapshot) => {
      const data = snapshot.val();
      const lessonBody = document.getElementById('lessonBody');
      lessonBody.innerHTML = '';
      if(data) {
        Object.keys(data).forEach(key => {
          const l = data[key];
          lessonBody.innerHTML += `<tr><td>${l.grade}</td><td>${l.subject}</td><td>${l.title}</td><td><button class="btn btn-sm btn-delete" onclick="deleteLesson('${key}')">Delete</button></td></tr>`;
        });
      }
    });
  }

  window.login = () => {
    if(email.value === ADMIN_EMAIL && password.value === ADMIN_PASSWORD) {
      localStorage.setItem('adminLogin', 'true'); showDashboard();
    } else { errorMsg.innerText = "❌ Wrong Email or Password"; }
  }
  window.logout = () => { localStorage.removeItem('adminLogin'); location.reload(); }
  function showDashboard() { loginScreen.style.display='none'; dashboardScreen.style.display='block'; }
  window.addLesson = () => {
    if(!grade.value ||!subject.value ||!title.value){alert('Fill all fields');return}
    push(lessonsRef,{grade:grade.value,subject:subject.value,title:title.value});
    grade.value='';subject.value='';title.value=''; showToast('✅ Saved to Cloud!')
  }
  window.deleteLesson = (key) => { if(confirm('Delete?')){ remove(ref(db,'lessons/'+key)); showToast('🗑️ Deleted') }}
  function showToast(msg){ toast.innerText=msg; toast.style.display='block'; setTimeout(()=>toast.style.display='none',2000) }
</script>
</body>
</html>
